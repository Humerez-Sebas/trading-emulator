name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

# build-and-push needs to read the repo and write packages to GHCR
permissions:
  contents: read
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push images to GHCR
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./emulador
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name (GHCR requires lowercase)
          images: ghcr.io/${{ github.repository }}-${{ matrix.name }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  # ----------------------------------------------------------------------------
  # Deploy is intentionally a disabled template (deploy deferred). When you pick
  # providers, enable this job and wire the steps:
  #   - Cloudflare Pages (frontend) -> needs secrets.CF_API_TOKEN, CF_ACCOUNT_ID
  #   - Render (backend, deploy hook) -> needs secrets.RENDER_DEPLOY_HOOK
  # Use a protected GitHub Environment (required reviewers + scoped secrets), and
  # prefer OIDC over long-lived tokens where the provider supports it.
