name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# least privilege: CI only needs to read the repo
permissions:
  contents: read

# cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint · tests · audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt ruff pip-audit
      - name: Lint + format (ruff)
        run: |
          ruff check .
          ruff format --check .
      - name: Unit tests (pytest)
        run: pytest -q
      - name: Dependency audit (pip-audit)
        run: pip-audit -r requirements.txt

  frontend:
    name: Frontend (lint · tests · build · audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: emulador
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: emulador/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint + format
        run: |
          npm run lint
          npm run format:check
      - name: Unit tests (vitest)
        run: npx ng test --watch=false
      - name: Production build
        run: npm run build
      - name: Offline static build
        run: npm run build -- --configuration offline
      - name: Dependency audit (npm, informational)
        # Angular's build toolchain pulls transitive advisories that can't be
        # fixed without breaking; report but don't block the build.
        run: npm audit --audit-level=high || true
        continue-on-error: true

  docker-build:
    name: Docker (compose config · image builds)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Validate compose files
        run: docker compose -f infra/docker-compose.yml -f infra/docker-compose.full.yml config -q
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./emulador
          push: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # Production deploy of the static offline frontend to Vercel.
  # Runs ONLY on push to main (i.e. a merged PR) and ONLY after the three
  # checks above pass, so production never deploys un-validated code. Vercel's
  # own auto-deploy for main is disabled in emulador/vercel.json to avoid a
  # double deploy; PR preview deployments stay handled by Vercel natively.
  deploy:
    name: Deploy (Vercel · prod)
    needs: [backend, frontend, docker-build]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_dVBTaqwZmidnC7KJf7h6BpLI
      VERCEL_PROJECT_ID: prj_KpNe7NDXP95iXljbwcZCh4Wcv0Wo
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      # rootDirectory=emulador is set on the Vercel project, so the CLI runs
      # from the repo root and builds emulador/ via emulador/vercel.json
      # (--configuration offline, output dist/emulador/browser, SPA rewrite).
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production
      - name: Build with Vercel (offline)
        run: vercel build --prod
      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod
