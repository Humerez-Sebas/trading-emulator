name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# least privilege: CI only needs to read the repo
permissions:
  contents: read

# cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    name: Pipeline (lint · tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pipeline/requirements*.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint + format (ruff)
        run: |
          ruff check .
          ruff format --check .
      - name: Unit tests (pytest)
        run: python -m pytest -q
      - name: Dependency audit (pip-audit)
        run: pip-audit -r requirements.txt

  frontend:
    name: Frontend (lint · tests · build · audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: emulador
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: emulador/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint + format
        run: |
          npm run lint
          npm run format:check
      - name: Unit tests (vitest)
        run: npx ng test --watch=false
      - name: Production build
        run: npm run build
      - name: Dependency audit (npm, informational)
        # Angular's build toolchain pulls transitive advisories that can't be
        # fixed without breaking; report but don't block the build.
        run: npm audit --audit-level=high || true
        continue-on-error: true

  # Production deploy of the static offline frontend to Vercel.
  # Runs ONLY on push to main (i.e. a merged PR) and ONLY after the checks
  # above pass, so production never deploys un-validated code. Vercel's
  # own auto-deploy for main is disabled in emulador/vercel.json to avoid a
  # double deploy; PR preview deployments stay handled by Vercel natively.
  deploy:
    name: Deploy (Vercel · prod)
    needs: [pipeline, frontend]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_dVBTaqwZmidnC7KJf7h6BpLI
      VERCEL_PROJECT_ID: prj_KpNe7NDXP95iXljbwcZCh4Wcv0Wo
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      # rootDirectory=emulador is set on the Vercel project, so the CLI runs
      # from the repo root and builds emulador/ via emulador/vercel.json
      # (output dist/emulador/browser, SPA rewrite).
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production
      - name: Build with Vercel
        run: vercel build --prod
      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod
