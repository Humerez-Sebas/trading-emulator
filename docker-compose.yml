# Base stack: database + backend API + self-hosted Flagsmith.
# The frontend is NOT here on purpose: in this mode you run it with
# `ng serve` (talking to http://localhost:8000). To run everything including
# the frontend in nginx, layer the override:
#
#   docker compose -f docker-compose.yml -f docker-compose.full.yml up
#
# Copy .env.example -> .env first. Everything reads from there.

services:
  # --- Emulador time-series database (TimescaleDB in dev) ---
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-emulador}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-emulador}
      POSTGRES_DB: ${POSTGRES_DB:-emulador}
    volumes:
      - emulador-db-data:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5432:5432'
    networks:
      - app-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-emulador} -d ${POSTGRES_DB:-emulador}']
      interval: 5s
      timeout: 5s
      retries: 10

  # --- FastAPI backend ---
  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-emulador}:${POSTGRES_PASSWORD:-emulador}@db:5432/${POSTGRES_DB:-emulador}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      INGEST_API_KEY: ${INGEST_API_KEY:-dev-only-ingest-key}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      # schema-level Timescale switch: must match the db image above
      TIMESCALE_ENABLED: ${TIMESCALE_ENABLED:-true}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      ENABLE_DOCS: ${ENABLE_DOCS:-true}
      # empty key -> backend uses the env defaults above (no Flagsmith needed)
      FLAGSMITH_KEY: ${FLAGSMITH_KEY:-}
      FLAGSMITH_API_URL: ${FLAGSMITH_API_URL:-http://flagsmith:8000/api/v1/}
    ports:
      - '127.0.0.1:8000:8000'
    networks:
      - app-net

  # --- Flagsmith (self-hosted feature flags): its own Postgres, isolated ---
  flagsmith-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${FLAGSMITH_POSTGRES_USER:-flagsmith}
      POSTGRES_PASSWORD: ${FLAGSMITH_POSTGRES_PASSWORD:-flagsmith}
      POSTGRES_DB: ${FLAGSMITH_POSTGRES_DB:-flagsmith}
    volumes:
      - flagsmith-db-data:/var/lib/postgresql/data
    networks:
      - flagsmith-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${FLAGSMITH_POSTGRES_USER:-flagsmith}']
      interval: 5s
      timeout: 5s
      retries: 10

  flagsmith:
    image: flagsmith/flagsmith:latest
    depends_on:
      flagsmith-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${FLAGSMITH_POSTGRES_USER:-flagsmith}:${FLAGSMITH_POSTGRES_PASSWORD:-flagsmith}@flagsmith-db:5432/${FLAGSMITH_POSTGRES_DB:-flagsmith}
      DJANGO_SECRET_KEY: ${FLAGSMITH_DJANGO_SECRET_KEY:-dev-only-change-me}
      DJANGO_ALLOWED_HOSTS: '*'
    ports:
      # dashboard + API at http://localhost:8001 (8000 is the backend's)
      - '127.0.0.1:8001:8000'
    networks:
      - app-net
      - flagsmith-net

volumes:
  emulador-db-data:
  flagsmith-db-data:

networks:
  app-net:
  # isolates Flagsmith's own database from the application network
  flagsmith-net:
