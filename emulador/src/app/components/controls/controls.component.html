<div class="toolbar">
  @if (assets().length) {
    <ui-dropdown
      ariaLabel="Activo"
      [options]="assetOptions()"
      [value]="currentAsset() ?? ''"
      (valueChange)="onAsset($event)"
    />
  }

  <div class="tf-group" role="group" aria-label="Temporalidad">
    @for (tf of tfs(); track tf) {
      <button
        class="tf-btn"
        [class.active]="tf === activeTf() && customTf() === null"
        [class.short]="isShortTf(tf)"
        [appTooltip]="isShortTf(tf) ? shortTfTip(tf) : ''"
        (click)="setTf(tf)"
      >
        {{ tf }}
      </button>
    }
    @if (customTf() !== null) {
      <span
        class="tf-chip"
        appTooltip="Temporalidad personalizada. Escribe un número para cambiarla."
      >
        {{ customChipLabel() }}
      </span>
    }
  </div>
</div>
