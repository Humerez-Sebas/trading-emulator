<div class="hud" appDraggable=".grip" dragStorageKey="emulador.playbackPos">
  <div class="ctl-row">
    <button
      class="grip"
      appTooltip="Arrastrar el panel"
      aria-label="Mover el panel de reproducción"
    >
      <svg width="12" height="14" viewBox="0 0 24 24" fill="currentColor">
        <circle cx="8" cy="5" r="1.6"></circle>
        <circle cx="16" cy="5" r="1.6"></circle>
        <circle cx="8" cy="12" r="1.6"></circle>
        <circle cx="16" cy="12" r="1.6"></circle>
        <circle cx="8" cy="19" r="1.6"></circle>
        <circle cx="16" cy="19" r="1.6"></circle>
      </svg>
    </button>

    <div class="sep"></div>

    <div class="grp" role="group" aria-label="Transporte">
      <button
        class="btn"
        appTooltip="Retroceder una vela"
        (pointerdown)="startRepeat('back')"
        (pointerup)="stopRepeat()"
        (pointerleave)="stopRepeat()"
      >
        −1
      </button>
      @if (playing()) {
        <button class="btn play" (click)="pause()" aria-label="Pausar">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
            <rect x="5" y="4" width="5" height="16" rx="1"></rect>
            <rect x="14" y="4" width="5" height="16" rx="1"></rect>
          </svg>
        </button>
      } @else {
        <button class="btn play" (click)="play()" aria-label="Reproducir">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="6,4 20,12 6,20"></polygon>
          </svg>
        </button>
      }
      <button
        class="btn"
        appTooltip="Avanzar una vela"
        (pointerdown)="startRepeat('fwd')"
        (pointerup)="stopRepeat()"
        (pointerleave)="stopRepeat()"
      >
        +1
      </button>
    </div>

    <div class="sep"></div>

    <div class="grp" role="group" aria-label="Saltos">
      <button class="btn" appTooltip="Saltar atrás" (click)="jumpBack()">«</button>
      <button class="chip" appTooltip="Tamaño de salto" (click)="cycleJumpSize()">
        ×{{ jumpSize() }}
      </button>
      <button class="btn" appTooltip="Saltar adelante" (click)="jumpForward()">»</button>
    </div>

    <div class="sep"></div>

    <ui-dropdown
      ariaLabel="Velocidad"
      [options]="speedOptions"
      [value]="msPerCandle() + ''"
      (valueChange)="setSpeed($event)"
    />

    <div class="sep"></div>

    @if (clockMs(); as ms) {
      <span class="clock">{{ ms | date: 'dd MMM HH:mm' : 'UTC' }}</span>
    }
  </div>
</div>
