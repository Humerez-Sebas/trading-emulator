<button
  class="tool"
  [class.active]="activeTool() === 'rect'"
  (click)="pick('rect')"
  appTooltip="Rectángulo"
  tooltipShortcut="Alt+R"
  [tooltipPosition]="vertical() ? 'right' : 'top'"
  aria-keyshortcuts="Alt+R"
  aria-label="Dibujar rectángulo (marcar zonas)"
>
  <svg
    width="16"
    height="16"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
    stroke-linecap="round"
  >
    <rect x="4" y="7" width="16" height="10" rx="1"></rect>
  </svg>
</button>

<button
  class="tool"
  [class.active]="activeTool() === 'line'"
  (click)="pick('line')"
  appTooltip="Tendencia"
  tooltipShortcut="Alt+T"
  [tooltipPosition]="vertical() ? 'right' : 'top'"
  aria-keyshortcuts="Alt+T"
  aria-label="Dibujar línea de tendencia (mantén Shift para recta horizontal/vertical)"
>
  <svg
    width="16"
    height="16"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
    stroke-linecap="round"
  >
    <line x1="5" y1="19" x2="19" y2="5"></line>
    <circle cx="5" cy="19" r="1.5" fill="currentColor"></circle>
    <circle cx="19" cy="5" r="1.5" fill="currentColor"></circle>
  </svg>
</button>

<button
  class="tool"
  [class.active]="activeTool() === 'fib'"
  (click)="pick('fib')"
  appTooltip="Fibonacci"
  tooltipShortcut="Alt+F"
  [tooltipPosition]="vertical() ? 'right' : 'top'"
  aria-keyshortcuts="Alt+F"
  aria-label="Dibujar fibonacci retracement"
>
  <svg
    width="16"
    height="16"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
    stroke-linecap="round"
  >
    <line x1="4" y1="6" x2="20" y2="6"></line>
    <line x1="4" y1="12" x2="20" y2="12"></line>
    <line x1="4" y1="18" x2="20" y2="18"></line>
  </svg>
</button>

<button
  class="tool"
  [class.active]="activeTool() === 'ruler'"
  (click)="pick('ruler')"
  appTooltip="Regla"
  tooltipShortcut="Alt+M"
  [tooltipPosition]="vertical() ? 'right' : 'top'"
  aria-keyshortcuts="Alt+M"
  aria-label="Medir distancia (velas, puntos y %)"
>
  <svg
    width="16"
    height="16"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <path
      d="M21.3 8.7 15.3 2.7a1 1 0 0 0-1.4 0L2.7 13.9a1 1 0 0 0 0 1.4l6 6a1 1 0 0 0 1.4 0L21.3 10a1 1 0 0 0 0-1.4Z"
    ></path>
    <line x1="7.5" y1="10.5" x2="9" y2="12"></line>
    <line x1="10.5" y1="7.5" x2="12" y2="9"></line>
    <line x1="13.5" y1="4.5" x2="15" y2="6"></line>
  </svg>
</button>

<div class="sep"></div>

<div class="eye-wrap">
  <button
    class="tool"
    [class.eye-off]="!boxesVisible()"
    [attr.aria-pressed]="boxesVisible()"
    (click)="toggleBoxes()"
    (contextmenu)="onEyeContextMenu($event)"
    [appTooltip]="(boxesVisible() ? 'Ocultar' : 'Mostrar') + ' cajas de trade'"
    [tooltipPosition]="vertical() ? 'right' : 'top'"
    aria-label="Mostrar u ocultar las cajas de trade (click derecho: por trade)"
  >
    @if (boxesVisible()) {
      <svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
    } @else {
      <svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c6.5 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path>
        <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3.5 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path>
        <line x1="2" y1="2" x2="22" y2="22"></line>
      </svg>
    }
  </button>
  <button
    class="caret"
    (click)="toggleMenu()"
    aria-haspopup="menu"
    [attr.aria-expanded]="menuOpen()"
    appTooltip="Cajas por trade"
    [tooltipPosition]="vertical() ? 'right' : 'top'"
    aria-label="Abrir lista de cajas por trade"
  >
    <svg
      width="10"
      height="10"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="3"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
  </button>

  @if (menuOpen()) {
    <div class="dropdown" role="menu" aria-label="Cajas de trades cerrados">
      <p class="dd-title">Cajas de trades cerrados</p>
      @if (!tradesNewestFirst().length) {
        <p class="dd-empty">Aún no hay trades cerrados.</p>
      }
      @for (t of tradesNewestFirst(); track t.id) {
        <button
          class="dd-row"
          role="menuitemcheckbox"
          [attr.aria-checked]="!t.hidden"
          [class.row-hidden]="t.hidden"
          (click)="toggleBox(t.id, t.hidden)"
          title="{{ t.hidden ? 'Mostrar' : 'Ocultar' }} la caja de este trade"
        >
          <span class="dd-side" [class.buy]="t.side === 'buy'" [class.sell]="t.side === 'sell'">
            {{ t.side === 'buy' ? 'Compra' : 'Venta' }}
          </span>
          <span class="dd-date">{{ formatTime(t.closeTime) }}</span>
          <span class="dd-pl" [class.up]="t.profit >= 0" [class.down]="t.profit < 0">
            {{ formatProfit(t.profit) }}
          </span>
          <span class="dd-eye" aria-hidden="true">
            @if (!t.hidden) {
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            } @else {
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M9.9 4.24A9.12 9.12 0 0 1 12 4c6.5 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"
                ></path>
                <path
                  d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3.5 7 10 7a9.74 9.74 0 0 0 5.39-1.61"
                ></path>
                <line x1="2" y1="2" x2="22" y2="22"></line>
              </svg>
            }
          </span>
        </button>
      }
    </div>
  }
</div>

<div class="sep"></div>

<button
  class="tool danger"
  [disabled]="!selectedId()"
  (click)="deleteSelected()"
  appTooltip="Eliminar selección"
  tooltipShortcut="Supr"
  [tooltipPosition]="vertical() ? 'right' : 'top'"
  aria-keyshortcuts="Delete"
  aria-label="Eliminar dibujo seleccionado"
>
  <svg
    width="16"
    height="16"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
    stroke-linecap="round"
  >
    <polyline points="3 6 5 6 21 6"></polyline>
    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
  </svg>
</button>

<button
  class="tool danger"
  [disabled]="!items().length"
  (click)="clearAll()"
  appTooltip="Borrar todo"
  [tooltipPosition]="vertical() ? 'right' : 'top'"
  aria-label="Borrar todos los dibujos"
>
  <svg
    width="16"
    height="16"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <path d="M3 6h18"></path>
    <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
    <line x1="9" y1="11" x2="9" y2="17"></line>
    <line x1="15" y1="11" x2="15" y2="17"></line>
    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path>
  </svg>
</button>
