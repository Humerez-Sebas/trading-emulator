<div class="wrap">
  <form class="card" (ngSubmit)="submit()" aria-labelledby="auth-title">
    <div class="brand" aria-hidden="true">
      <svg
        width="22"
        height="22"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
        <polyline points="16 7 22 7 22 13"></polyline>
      </svg>
    </div>
    <h1 id="auth-title">Iniciar sesión</h1>
    <p class="sub">Entra para acceder a los mercados y tus sesiones.</p>

    <label class="field">
      <span>Correo</span>
      <input
        type="email"
        name="email"
        autocomplete="email"
        [ngModel]="email()"
        (ngModelChange)="email.set($event)"
        required
      />
    </label>

    <label class="field">
      <span>Contraseña</span>
      <input
        type="password"
        name="password"
        autocomplete="current-password"
        [ngModel]="password()"
        (ngModelChange)="password.set($event)"
        required
        minlength="6"
      />
    </label>

    @if (error()) {
      <p class="error" role="alert">{{ error() }}</p>
    }

    <button
      appButton
      variant="primary"
      [block]="true"
      class="submit"
      type="submit"
      [disabled]="!valid() || pending()"
    >
      @if (pending()) {
        <span class="spinner" aria-hidden="true"></span>
        Entrando…
      } @else {
        Entrar
      }
    </button>
  </form>
</div>
